name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # Actions 画面から手動実行もできる

permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行を1つに絞る（連続 push でのデプロイ競合を避ける）
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # base はここだけで指定する（vite.config.ts は変更しない）
      - run: npm run build -- --base=/chiptune-studio/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
